version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=testing
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_PROTOCOL=NONE
    depends_on:
      mailhog:
        condition: service_healthy
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8025"]
      interval: 5s
      timeout: 5s
      retries: 5

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_PROTOCOL=NONE
      - FLASK_ENV=testing
      - PYTHONPATH=/app
      - BASE_URL=http://web:5000
      - MAILHOG_HOST=mailhog
      - MAILHOG_HTTP_PORT=8025
    volumes:
      - .:/app
      - ./test-results:/app/test/test-results
      - /app/__pycache__
      - /app/test/e2e_test/__pycache__
    depends_on:
      web:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    networks:
      - test-network
    restart: on-failure

networks:
  test-network:
    driver: bridge
