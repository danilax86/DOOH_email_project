<!-- app/templates/status.html -->
<div id="status-box">{{ status }}</div>

{% if job_id %}
<script>
	(function(){
		const jobId = "{{ job_id }}";
		const box = document.getElementById('status-box');
		function poll(){
			fetch('/send-status/' + jobId)
				.then(r => {
					if (!r.ok) throw new Error('Status fetch failed');
					return r.json();
				})
				.then(data => {
					if (data.status) box.textContent = data.status;
					if (!data.done) {
						// poll again shortly
						setTimeout(poll, 2000);
					}
				})
				.catch(err => {
					console.error('Status poll error', err);
					// retry after a bit
					setTimeout(poll, 5000);
				});
		}
		// start polling soon
		setTimeout(poll, 1000);
	})();
</script>
{% endif %}
